<!DOCTYPE html>
<html>
<head>

    <link rel="manifest" href="manifest.json">
  <title>Chitravault</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f2f4f7;
    margin: 0;
  }

  h1 {
    text-align: center;
    padding: 20px 0;
    margin: 0;
  }

.header {
  text-align: center;
  padding: 20px 10px 10px;
}

.header p {
  margin: 0;
  color: #6b7280;
  font-size: 14px;
}
  
  .app-container {
    max-width: 420px;
    margin: auto;
    padding: 10px;
  }

  .btn {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 14px;
    background: #1f2937;
    color: white;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 500;
    border: none;
  }

.card-btn {
  background: white;
  padding: 16px;
  margin: 10px 0;
  border-radius: 14px;
  text-align: left;
  font-size: 16px;
  font-weight: 500;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  cursor: pointer;
}

  .btn:hover {
    background: #374151;
  }

  .container {
    display: none;
    padding: 10px;
  }

  input, textarea {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 14px;
  }

  .card {
    background: white;
    padding: 12px;
    margin: 10px 0;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    text-align: left;
  }

  .card b {
    font-size: 15px;
  }

  .delete-btn {
    margin-top: 10px;
    background: #ef4444;
    padding: 8px;
    border-radius: 8px;
    color: white;
    border: none;
    cursor: pointer;
  }

  #lockScreen {
    max-width: 400px;
    margin: 100px auto;
    text-align: center;
  }
    </style>
</head>

<body>


<!-- LOCK SCREEN -->
<div id="lockScreen">
  <h2>Enter PIN</h2>
  <input id="pinInput" type="password" placeholder="Enter PIN"><br>

  <div class="btn" onclick="checkPin()">Unlock</div>

  <div id="setPinSection" style="display:none;">
    <h3>Set New PIN</h3>
    <input id="newPin" type="password" placeholder="Set PIN"><br>
    <div class="btn" onclick="setPin()">Save PIN</div>
  </div>
</div>



<div id="app" style="display:none;">

      <div class="app-container"> 

  <div class="header">
  <h1>Chitravault</h1>
  <p>Your personal financial vault</p>
</div>

  <!-- HOME -->
  <div id="home">
    <div class="card-btn" onclick="showSection('insurance')">
    🛡️ Insurance
  </div>
    <div class="card-btn" onclick="showSection('investments')">
    📈 Investments
  </div>
    <div class="card-btn" onclick="showSection('emergency')">
    🚨 Emergency Note
  </div>
  <div class="card-btn" onclick="showSection('changePin')">
  🔐 Change PIN
    </div>
    <div class="card-btn" onclick="showSection('trusted')">
  👤 Trusted Contact
    </div>
    <div class="card-btn" onclick="exportData()">
    📤 Export Backup
  </div>
    <div class="card-btn" onclick="document.getElementById('fileInput').click()">
    📥 Import Backup
  </div>
<input type="file" id="fileInput" accept=".json" style="display:none" onchange="importData(event)">
  </div>

  <!-- INSURANCE -->
  <div id="insurance" class="container">
    <h2>Insurance</h2>

    
    <label>Company</label>
    <input id="company">

    <label>Policy Number</label>
    <input id="policy">

    <label>Nominee</label>
    <input id="nominee">

    <div class="btn" onclick="addItem('insurance', ['company','policy','nominee'])">Save</div>
    <div class="btn" onclick="goHome()">Back</div>

    <div id="insuranceList"></div>
  </div>

  <!-- INVESTMENTS -->
  <div id="investments" class="container">
    <h2>Investments</h2>

    <label>Platform</label>
    <input id="platform">

    <label>Type</label>
    <input id="type">

    <label>Nominee</label>
    <input id="invNominee">

    <div class="btn" onclick="addItem('investments', ['platform','type','invNominee'])">Save</div>
    <div class="btn" onclick="goHome()">Back</div>

    <div id="investmentsList"></div>
  </div>

  <!-- EMERGENCY -->
<div id="emergency" class="container">
  <h2 class="section-title">Emergency Plan</h2>

  <!-- ✅ FORM START -->
  <div id="emergencyForm">

    <label>Step 1: Who should be contacted first?</label>
    <input id="emgContact">

    <label>Step 2: Where are passwords stored?</label>
    <input id="emgPasswords">

    <label>Step 3: Insurance handling</label>
    <input id="emgInsurance">

    <label>Step 4: Where are investments?</label>
    <input id="emgInvestments">

    <label>Step 5: Where are important documents stored?</label>
    <input id="emgDocs">

    <label>Step 6: Advisor / CA</label>
    <input id="emgAdvisor">

    <button class="btn primary" onclick="saveEmergency()">Save</button>

  </div>
  <!-- ✅ FORM END -->

  <button class="btn secondary" onclick="goHome()">Back</button>

  <div id="emergencyDisplay"></div>
</div>

  <!--change pin -->
<div id="changePin" class="container">
    <h2 class="section-title">Change PIN</h2>

    <label>Current PIN</label>
    <input id="currentPin" type="password">

    <label>New PIN</label>
    <input id="newPinChange" type="password">

    <button class="btn primary" onclick="changePin()">Update PIN</button>
    <button class="btn secondary" onclick="goHome()">Back</button>
</div>

<!--Trusted Contact -->
<div id="trusted" class="container">
  <h2 class="section-title">Trusted Contacts</h2>

  <!-- ADD BUTTON -->
  <button class="btn primary" onclick="toggleTrustedForm()">+ Add Contact</button>

  <!-- FORM -->
  <div id="trustedForm" style="display:none;">
    <label>Name</label>
    <input id="tcName">

    <label>Phone</label>
    <input id="tcPhone">

    <label>Relationship</label>
    <input id="tcRelation">

    <label>Notes</label>
    <input id="tcNotes">

    <button class="btn primary" onclick="addTrusted()">Save</button>
  </div>

  <!-- LIST -->
  <div id="trustedList"></div>

  <button class="btn secondary" onclick="goHome()">Back</button>
</div>

  </div>
</div>

<script>

document.addEventListener("visibilitychange", function () {
  if (document.hidden) {
    lockApp();
  }
});

function lockApp() {
  document.getElementById("app").style.display = "none";
  document.getElementById("lockScreen").style.display = "block";

  // Clear entered PIN
  document.getElementById("pinInput").value = "";
}

function checkPin() {
  let savedPin = localStorage.getItem("appPin");
  let enteredPin = document.getElementById("pinInput").value;

  if (enteredPin === savedPin) {
    unlockApp();
  } else {
    alert("Wrong PIN");
  }
}

function setPin() {
  let newPin = document.getElementById("newPin").value;
  localStorage.setItem("appPin", newPin);
  unlockApp();
}

function changePin() {
  let current = document.getElementById("currentPin").value;
  let newPin = document.getElementById("newPinChange").value;

  let savedPin = localStorage.getItem("appPin");

  if (current !== savedPin) {
    alert("Current PIN is incorrect ❌");
    return;
  }

  if (!newPin || newPin.length < 4) {
    alert("New PIN must be at least 4 digits");
    return;
  }

  localStorage.setItem("appPin", newPin);

  alert("PIN updated successfully ✅");

  // clear fields
  document.getElementById("currentPin").value = "";
  document.getElementById("newPinChange").value = "";

  goHome();
}

function unlockApp() {
  document.getElementById("lockScreen").style.display = "none";
  document.getElementById("app").style.display = "block";
}

function hideAllSections() {
  document.getElementById("insurance").style.display = "none";
  document.getElementById("investments").style.display = "none";
  document.getElementById("emergency").style.display = "none";
  document.getElementById("changePin").style.display = "none";
  document.getElementById("trusted").style.display = "none"; 
}
function showSection(section) {
  document.getElementById("home").style.display = "none";
  
  hideAllSections(); 

  document.getElementById(section).style.display = "block";

  if (section === "insurance") {
    loadItems("insurance", ["company","policy","nominee"]);
  }

  if (section === "investments") {
    loadItems("investments", ["platform","type","invNominee"]);
  }

  if (section === "emergency") {
    loadEmergency();
  }
    if (section === "trusted") {
    loadTrustedList();
    }
}
function goHome() {
  hideAllSections(); // ✅ important
  document.getElementById("home").style.display = "block";
}

function saveEmergency() {
  let data = {
    contact: document.getElementById("emgContact").value,
    passwords: document.getElementById("emgPasswords").value,
    insurance: document.getElementById("emgInsurance").value,
    docs: document.getElementById("emgDocs").value,
    advisor: document.getElementById("emgAdvisor").value,
    investments: document.getElementById("emgInvestments").value
  };

  localStorage.setItem("emergencyPlan", JSON.stringify(data));

  // clear fields
  document.getElementById("emgContact").value = "";
  document.getElementById("emgPasswords").value = "";
  document.getElementById("emgInsurance").value = "";
  document.getElementById("emgDocs").value = "";
  document.getElementById("emgAdvisor").value = "";
  document.getElementById("emgInvestments").value = "";

  // hide form after save
  document.getElementById("emergencyForm").style.display = "none";

  loadEmergency();
}


function loadEmergency() {
  let data = JSON.parse(localStorage.getItem("emergencyPlan"));

  let form = document.getElementById("emergencyForm");
  let display = document.getElementById("emergencyDisplay");

  // 👉 If NO data → show form
  if (!data) {
    form.style.display = "block";
    display.innerHTML = "";
    return;
  }

  // 👉 If data exists → hide form
  form.style.display = "none";

  // show saved data
  display.innerHTML = `
    <div class="card">
      <b>1. Contact:</b> ${data.contact}<br>
      <b>2. Passwords:</b> ${data.passwords}<br>
      <b>3. Insurance:</b> ${data.insurance}<br>
      <b>4. Investments:</b> ${data.investments}<br>
      <b>5. Documents:</b> ${data.docs}<br>
      <b>6. Advisor:</b> ${data.advisor}<br><br>
      
      <button class="btn secondary" onclick="editEmergency()">Edit</button>
    </div>
  `;

  // prefill inputs (for edit)
  document.getElementById("emgContact").value = data.contact || "";
  document.getElementById("emgPasswords").value = data.passwords || "";
  document.getElementById("emgInsurance").value = data.insurance || "";
  document.getElementById("emgInvestments").value = data.investments || "";
  document.getElementById("emgDocs").value = data.docs || "";
  document.getElementById("emgAdvisor").value = data.advisor || "";
}

function editEmergency() {
  document.getElementById("emergencyForm").style.display = "block";
}

// Items
function addItem(section, fields) {
  let data = JSON.parse(localStorage.getItem(section)) || [];

  let newItem = {};
  fields.forEach(f => {
    newItem[f] = document.getElementById(f).value;
    document.getElementById(f).value = "";
  });

  data.push(newItem);
  localStorage.setItem(section, JSON.stringify(data));

  loadItems(section, fields);
}

function loadItems(section, fields) {
  let data = JSON.parse(localStorage.getItem(section)) || [];
  let list = document.getElementById(section + "List");
  list.innerHTML = "";

  data.forEach((item, index) => {
    let content = `
    <div><b>${item[fields[0]] || ""}</b></div>
    <div style="color:#6b7280; font-size:13px;">
        ${fields.slice(1).map(f => item[f]).join(" • ")}
    </div>
    `;

   list.innerHTML += `
    <div class="card">
        ${content}
        <button class="delete-btn" onclick="deleteItem('${section}', ${index})">Delete</button>
    </div>
    `;
  });
}

function toggleTrustedForm() {
  let form = document.getElementById("trustedForm");
  form.style.display = form.style.display === "none" ? "block" : "none";
}

function addTrusted() {
  let data = JSON.parse(localStorage.getItem("trustedContacts")) || [];

  let newContact = {
    name: document.getElementById("tcName").value,
    phone: document.getElementById("tcPhone").value,
    relation: document.getElementById("tcRelation").value,
    notes: document.getElementById("tcNotes").value
  };

  data.push(newContact);
  localStorage.setItem("trustedContacts", JSON.stringify(data));

  // clear inputs
  document.getElementById("tcName").value = "";
  document.getElementById("tcPhone").value = "";
  document.getElementById("tcRelation").value = "";
  document.getElementById("tcNotes").value = "";

  document.getElementById("trustedForm").style.display = "none";

  loadTrustedList();
}

function loadTrustedList() {
  let data = JSON.parse(localStorage.getItem("trustedContacts")) || [];
  let list = document.getElementById("trustedList");

  list.innerHTML = "";

  data.forEach((item, index) => {
    list.innerHTML += `
      <div class="card">
        <b>${item.name}</b><br>
        ${item.relation} • ${item.phone}<br>
        <span style="color:#6b7280">${item.notes}</span><br>
        <button class="delete-btn" onclick="deleteTrusted(${index})">Delete</button>
      </div>
    `;
  });
}

function deleteTrusted(index) {
  let data = JSON.parse(localStorage.getItem("trustedContacts")) || [];
  data.splice(index, 1);
  localStorage.setItem("trustedContacts", JSON.stringify(data));
  loadTrustedList();
}

function loadTrusted() {
  let data = JSON.parse(localStorage.getItem("trustedContact"));

  if (!data) return;

  document.getElementById("trustedDisplay").innerHTML = `
    <div class="card">
      <b>${data.name}</b><br>
      ${data.relation}<br>
      ${data.phone}<br>
      <span style="color:#6b7280">${data.notes}</span>
    </div>
  `;

  // prefill inputs (edit mode)
  document.getElementById("tcName").value = data.name || "";
  document.getElementById("tcPhone").value = data.phone || "";
  document.getElementById("tcRelation").value = data.relation || "";
  document.getElementById("tcNotes").value = data.notes || "";
}

function exportData() {
  let data = {
    insurance: JSON.parse(localStorage.getItem("insurance")) || [],
    investments: JSON.parse(localStorage.getItem("investments")) || [],
    emergency: localStorage.getItem("emergencyNote") || ""
  };

  let json = JSON.stringify(data, null, 2);

  let blob = new Blob([json], { type: "application/json" });
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "chitravault-backup.json";
  a.click();

  URL.revokeObjectURL(url);
}

function importData(event) {
  let file = event.target.files[0];

  if (!file) return;

  let reader = new FileReader();

  reader.onload = function(e) {
    try {
      let data = JSON.parse(e.target.result);

      // Restore data
      localStorage.setItem("insurance", JSON.stringify(data.insurance || []));
      localStorage.setItem("investments", JSON.stringify(data.investments || []));
      localStorage.setItem("emergencyNote", data.emergency || "");

      alert("Backup restored successfully ✅");

    } catch (err) {
      alert("Invalid backup file ❌");
    }
  };

  reader.readAsText(file);
}

function deleteItem(section, index) {
  let data = JSON.parse(localStorage.getItem(section)) || [];
  data.splice(index, 1);
  localStorage.setItem(section, JSON.stringify(data));

  loadItems(section, Object.keys(data[0] || {}));
}
window.onload = function () {
  let savedPin = localStorage.getItem("appPin");

  if (!savedPin) {
    // No PIN yet → show set PIN only
    document.getElementById("setPinSection").style.display = "block";
    document.getElementById("pinInput").style.display = "none";
  } else {
    // PIN exists → show enter PIN
    document.getElementById("setPinSection").style.display = "none";
    document.getElementById("pinInput").style.display = "block";
  }

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js")
    .then(() => console.log("SW registered"));
}

};  
</script>

</body>
</html>
